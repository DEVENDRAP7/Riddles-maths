name: riddles_maths
description: "Riddles - Maths: 100-level math riddle puzzle game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage (progress, settings) — no cloud
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.6.2

  # Cartoon styling + animation
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/levels.json
