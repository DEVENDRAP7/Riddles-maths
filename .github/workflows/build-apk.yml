name: Build Android APK

# Builds a debug APK in the cloud so it can be downloaded and sideloaded onto
# a phone without compiling locally. Runs on every push to main and can also
# be started by hand from the Actions tab (handy from the GitHub mobile app).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: riddles-maths-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
